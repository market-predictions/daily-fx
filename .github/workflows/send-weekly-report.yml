name: Send weekly ETF report

on:
  push:
    paths:
      - "output/weekly_analysis_*.md"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send email
        env:
          SMTP_HOST: ${{ secrets.MRKT_RPRTS_SMTP_HOST }}
          SMTP_PORT: ${{ secrets.MRKT_RPRTS_SMTP_PORT }}
          SMTP_USER: ${{ secrets.MRKT_RPRTS_SMTP_USER }}
          SMTP_PASS: ${{ secrets.MRKT_RPRTS_SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MRKT_RPRTS_MAIL_FROM }}
          MAIL_TO: ${{ secrets.MRKT_RPRTS_MAIL_TO }}
        run: python send_report.py
