name: Daily market prediction run

on:
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    environment: market-predictions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy matplotlib tabulate

      - name: Run script
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: |
          python "prediction.py"

      - name: Find newest zip
        id: find_zip
        run: |
          ZIP_FILE=$(find . -type f -name "*.zip" | sort | tail -n 1)
          echo "zip_file=$ZIP_FILE" >> $GITHUB_OUTPUT
          echo "Found zip: $ZIP_FILE"

      - name: Create tag name
        id: tag
        run: |
          echo "tag_name=daily-$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Publish release with zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: Daily run ${{ steps.tag.outputs.tag_name }}
          files: ${{ steps.find_zip.outputs.zip_file }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}





