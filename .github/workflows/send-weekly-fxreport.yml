name: Send Weekly FX Report

on:
  workflow_dispatch:
  push:
    paths:
      - 'fx.txt'
      - 'send_fxreport.py'
      - 'fx_technical_overlay.py'
      - '.github/workflows/send-weekly-fxreport.yml'
      - 'output/weekly_fx_review_*.md'

permissions:
  contents: write

concurrency:
  group: send-weekly-fxreport
  cancel-in-progress: false

jobs:
  send-fx-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests markdown matplotlib weasyprint

      - name: Build FX technical overlay
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          TWELVEDATA_CALLS_PER_MINUTE: "8"
          TWELVEDATA_RATE_LIMIT_WINDOW_SECONDS: "60"
          TWELVEDATA_RATE_LIMIT_BUFFER_SECONDS: "1.0"
          TWELVEDATA_MAX_RETRIES: "5"
          TWELVEDATA_HTTP_TIMEOUT_SECONDS: "30"
        run: |
          python fx_technical_overlay.py

      - name: Commit FX technical overlay if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ ! -f output/fx_technical_overlay.json ]; then
            echo "fx_technical_overlay.json not found; failing."
            exit 1
          fi

          git add output/fx_technical_overlay.json

          if git diff --cached --quiet; then
            echo "No changes in fx_technical_overlay.json; nothing to commit."
          else
            git commit -m "Update FX technical overlay"
            git push
          fi

      - name: Render and send FX report
        env:
          MRKT_RPRTS_SMTP_HOST: ${{ secrets.MRKT_RPRTS_SMTP_HOST }}
          MRKT_RPRTS_SMTP_PORT: ${{ secrets.MRKT_RPRTS_SMTP_PORT }}
          MRKT_RPRTS_SMTP_USER: ${{ secrets.MRKT_RPRTS_SMTP_USER }}
          MRKT_RPRTS_SMTP_PASS: ${{ secrets.MRKT_RPRTS_SMTP_PASS }}
          MRKT_RPRTS_MAIL_FROM: ${{ secrets.MRKT_RPRTS_MAIL_FROM }}
          MRKT_RPRTS_MAIL_TO: ${{ secrets.MRKT_RPRTS_MAIL_TO }}
        run: |
          python send_fxreport.py
