name: Prep FX state from run-queue trigger

on:
  push:
    branches:
      - main
    paths:
      - 'control/run_queue/fx_prep_trigger_*.md'
      - 'control/run_queue/fx_refresh_trigger_*.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fx-prep-from-run-queue
  cancel-in-progress: false

jobs:
  validate-trigger:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      trigger_path: ${{ steps.detect.outputs.trigger_path }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect trigger file
        id: detect
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          CHANGED_FILE="$(git diff --name-only "$BEFORE" "$AFTER" | grep '^control/run_queue/fx_.*_trigger_.*\.md$' | head -n 1 || true)"

          if [ -z "$CHANGED_FILE" ]; then
            echo "No FX trigger file found in push payload" >&2
            exit 1
          fi

          echo "trigger_path=$CHANGED_FILE" >> "$GITHUB_OUTPUT"
          echo "TRIGGER_PATH=$CHANGED_FILE"

      - name: Validate trigger content
        env:
          TRIGGER_PATH: ${{ steps.detect.outputs.trigger_path }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          path = Path(os.environ["TRIGGER_PATH"])
          text = path.read_text(encoding="utf-8")

          required_substrings = [
              "requested_at_utc",
              "requested_run_date",
              "mode",
              "note",
          ]

          missing = [item for item in required_substrings if item not in text]
          if missing:
              raise SystemExit(f"Trigger file validation failed for {path}: missing {missing}")

          allowed_modes = (
              "mode = one-command-delayed",
              "mode = generate-and-publish",
              "mode = refresh-fx-state",
              "mode: one-command-delayed",
              "mode: generate-and-publish",
              "mode: refresh-fx-state",
          )

          if not any(mode in text for mode in allowed_modes):
              raise SystemExit(
                  f"Trigger file validation failed for {path}: mode must be one-command-delayed, generate-and-publish, or refresh-fx-state"
              )

          print(f"TRIGGER_VALID | path={path}")
          PY

  refresh-state:
    needs:
      - validate-trigger
    if: ${{ github.event_name == 'workflow_dispatch' || needs.validate-trigger.result == 'success' }}
    uses: ./.github/workflows/refresh-fx-state.yml
    secrets: inherit
